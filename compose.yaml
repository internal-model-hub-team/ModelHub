name: model-hub

services:
  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    environment:
      SECRET_KEY: ${SECRET_KEY:-development-only-change-me}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://hub:hub@postgres:5432/hub}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      GITEA_MOCK: ${GITEA_MOCK:-true}
      GITEA_URL: ${GITEA_URL:-http://gitea:3000}
      GITEA_PUBLIC_URL: ${GITEA_PUBLIC_URL:-http://localhost:3001}
      GITEA_ADMIN_USERNAME: ${GITEA_ADMIN_USERNAME:-modelhub-admin}
      GITEA_ADMIN_TOKEN: ${GITEA_ADMIN_TOKEN:-}
      MOCK_STORAGE_ROOT: ${MOCK_STORAGE_ROOT:-/data/mock-gitea}
      MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-5368709120}
      LFS_THRESHOLD_BYTES: ${LFS_THRESHOLD_BYTES:-10485760}
      LFS_EXTENSIONS: ${LFS_EXTENSIONS:-.safetensors,.gguf,.bin,.pt,.pth,.onnx}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - mock-gitea-data:/data/mock-gitea
    depends_on:
      postgres:
        condition: service_healthy
      gitea:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: hub
      POSTGRES_PASSWORD: hub
      POSTGRES_DB: hub
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hub -d hub"]
      interval: 5s
      timeout: 3s
      retries: 10

  gitea:
    image: gitea/gitea:1.24.6
    environment:
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__server__DOMAIN: localhost
      # This URL must be reachable by both the host browser and the backend
      # container because Gitea returns absolute Git LFS upload URLs.
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL:-http://host.docker.internal:3001/}
      GITEA__server__SSH_DOMAIN: localhost
      GITEA__server__SSH_PORT: 2222
      GITEA__server__LFS_START_SERVER: "true"
    ports:
      - "3001:3000"
      - "2222:22"
    volumes:
      - gitea-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/v1/version"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
  gitea-data:
  mock-gitea-data:
