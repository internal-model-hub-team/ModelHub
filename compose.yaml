name: model-hub

services:
  web:
    build:
      context: ./apps/web
    environment:
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_GITEA_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ./services/api
    environment:
      DATABASE_URL: postgresql+psycopg://modelhub:modelhub@postgres:5432/modelhub
      CORS_ORIGINS: http://localhost:3000
      MODEL_STORAGE_ROOT: /data/model-files
      MAX_MODEL_FILE_SIZE_BYTES: 524288000
    ports:
      - "8000:8000"
    volumes:
      - model-files:/data/model-files
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: modelhub
      POSTGRES_USER: modelhub
      POSTGRES_PASSWORD: modelhub
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modelhub -d modelhub"]
      interval: 5s
      timeout: 3s
      retries: 10

  gitea:
    image: gitea/gitea:1.24.6
    environment:
      GITEA__server__DOMAIN: localhost
      GITEA__server__ROOT_URL: http://localhost:3001/
      GITEA__server__SSH_DOMAIN: localhost
      GITEA__server__SSH_PORT: 2222
      GITEA__server__LFS_START_SERVER: "true"
    ports:
      - "3001:3000"
      - "2222:22"
    volumes:
      - gitea-data:/data

volumes:
  postgres-data:
  gitea-data:
  model-files:
