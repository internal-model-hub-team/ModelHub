services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://hub:hub@postgres:5432/hub
      SECRET_KEY: change-this-before-production
      CORS_ORIGINS: http://localhost:3000
      GITEA_MOCK: "false"
      GITEA_URL: http://gitea:3000
      GITEA_ADMIN_TOKEN: ${GITEA_ADMIN_TOKEN:-}
    depends_on:
      - postgres
      - gitea

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: hub
      POSTGRES_PASSWORD: hub
      POSTGRES_DB: hub
    volumes:
      - postgres_data:/var/lib/postgresql/data

  gitea:
    image: gitea/gitea:1.24
    ports:
      - "3001:3000"
      - "2222:22"
    volumes:
      - gitea_data:/data

volumes:
  postgres_data:
  gitea_data:

